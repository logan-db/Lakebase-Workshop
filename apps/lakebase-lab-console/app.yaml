command:
  - "python"
  - "-m"
  - "uvicorn"
  - "app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  - name: LAKEBASE_PROJECT_ID
    # >>> Set this to YOUR project ID from notebook 00 output <<<
    # Format: lakebase-lab-<your-username>  (e.g. lakebase-lab-jane-doe)
    value: "lakebase-lab-logan-rupert"
  - name: LAKEBASE_BRANCH_ID
    value: "production"
  - name: LAKEBASE_SCHEMA
    value: "demo"

resources:
  - name: lakebase-db
    type: postgres
